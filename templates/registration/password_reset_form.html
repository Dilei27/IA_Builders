{% extends 'registration/base.html' %}

{% block title %}Recuperar senha | SCSI{% endblock %}

{% block content %}
<div class="text-xs text-blue-400 mb-3 tracking-widest uppercase">// Recuperação</div>
<h1 class="text-4xl font-dot tracking-tight mb-4">Recuperar senha</h1>
<p class="text-sm text-gray-400 leading-relaxed mb-8">Informe seu email para receber as instruções de redefinição de senha.</p>
<form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
        <label for="{{ form.email.id_for_label }}" class="block text-xs text-gray-400 mb-2">Email</label>
        <input type="email" name="{{ form.email.html_name }}" id="{{ form.email.id_for_label }}" autocomplete="email" required class="w-full rounded-xl bg-[#262A34] border border-white/10 px-4 py-3 text-sm text-white outline-none focus:border-blue-500/50">
    </div>
    <button type="submit" class="w-full px-6 py-3 rounded-full bg-white text-black font-semibold text-xs hover:bg-gray-200 transition-all shadow-[0_0_20px_rgba(255,255,255,0.2)]">Enviar instruções</button>
</form>
<div class="mt-6 text-center">
    <a href="{% url 'login' %}" class="text-xs text-gray-300 hover:text-white transition-colors">Voltar para login</a>
</div>
{% endblock %}
