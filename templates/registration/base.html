<!DOCTYPE html>
<html lang="pt-BR" class="antialiased scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SCSI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&amp;display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&amp;display=swap">
    <style>
        .font-dot { font-family: 'DotGothic16', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-[#0B0F19] text-white font-mono overflow-x-hidden min-h-screen selection:bg-blue-500/30">
    <div class="absolute inset-x-0 top-0 z-[-1] bg-[#0B0F19] h-screen">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[800px] rounded-full bg-blue-500/10 blur-[120px]"></div>
        <div class="absolute top-1/3 right-0 w-[500px] h-[500px] rounded-full bg-purple-500/10 blur-[120px]"></div>
    </div>
    <header class="w-full flex justify-between items-center px-6 md:px-10 py-6 z-50 relative">
        <div class="flex items-center gap-2.5 text-white font-medium text-base">
            <div class="bg-white text-[#0B0F19] rounded-lg p-1">
                <iconify-icon icon="solar:shield-check-bold" width="20"></iconify-icon>
            </div>
            <span class="tracking-tight font-mono">SCSI</span>
        </div>
    </header>
    <main class="relative z-10 min-h-[calc(100vh-96px)] flex items-center justify-center px-4 py-16">
        <div class="w-full max-w-md rounded-3xl p-[1px] bg-gradient-to-b from-white/20 via-white/5 to-transparent shadow-[0_30px_100px_-20px_rgba(0,0,0,1)]">
            <div class="bg-[#1C1F26] rounded-3xl p-8 border border-white/5">
                {% block content %}{% endblock %}
            </div>
        </div>
    </main>
</body>
</html>
