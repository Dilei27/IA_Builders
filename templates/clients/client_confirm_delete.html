{% extends 'clients/base.html' %}

{% block title %}Excluir cliente | SCSI{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto rounded-3xl p-[1px] bg-gradient-to-b from-white/20 via-white/5 to-transparent">
    <div class="bg-[#1C1F26] rounded-3xl p-8 border border-white/5">
        <div class="text-xs text-red-300 mb-3 tracking-widest uppercase">// Exclusão</div>
        <h1 class="text-4xl font-dot tracking-tight mb-4">Excluir cliente?</h1>
        <p class="text-sm text-gray-400 leading-relaxed mb-8">Esta ação removerá <span class="text-white">{{ object.name }}</span> da carteira da corretora.</p>
        <form method="post" class="flex gap-3">
            {% csrf_token %}
            <button type="submit" class="px-6 py-3 rounded-full bg-white text-black font-semibold text-xs hover:bg-gray-200 transition-all">Confirmar exclusão</button>
            <a href="{{ object.get_absolute_url }}" class="px-6 py-3 rounded-full bg-white/5 border border-white/10 text-white text-xs font-medium hover:bg-white/10 transition-all backdrop-blur-md">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
