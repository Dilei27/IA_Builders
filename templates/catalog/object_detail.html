{% extends 'base_app.html' %}

{% block title %}{{ object }} | SCSI{% endblock %}

{% block content %}
<div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-10">
    <div>
        <div class="text-xs text-blue-400 mb-3 tracking-widest uppercase">// {{ section_label }}</div>
        <h1 class="text-4xl md:text-5xl font-dot tracking-tight mb-2">{{ object }}</h1>
        <p class="text-sm text-gray-400">{{ title }}</p>
    </div>
    <div class="flex gap-3">
        <a href="{% url update_url_name object.pk %}" class="px-6 py-3 rounded-full bg-white text-black font-semibold text-xs hover:bg-gray-200 transition-all">Editar</a>
        <a href="{% url delete_url_name object.pk %}" class="px-6 py-3 rounded-full bg-white/5 border border-white/10 text-white text-xs font-medium hover:bg-white/10 transition-all backdrop-blur-md">Excluir</a>
    </div>
</div>
<div class="rounded-2xl border border-white/5 bg-[#1C1F26] divide-y divide-white/5">
    {% for label, value in details %}
        <div class="grid md:grid-cols-12 gap-3 px-6 py-5">
            <div class="md:col-span-3 text-xs text-gray-500 uppercase tracking-widest">{{ label }}</div>
            <div class="md:col-span-9 text-xs text-gray-300 leading-relaxed">{{ value }}</div>
        </div>
    {% endfor %}
</div>
{% endblock %}
