providers:
  docker:
    swarmMode: true
    exposedByDefault: false
    endpoint: unix:///var/run/docker.sock

  file:
    filename: /etc/traefik/dynamic.yml

api:
  dashboard: true
  debug: false

entryPoints:
  web:
    address: ':80'
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ':443'

certificatesResolvers:
  cloudflare:
    acme:
      email: admin@scsi.digital
      storage: /certificates/acme.json
      caServer: https://acme-v02.api.letsencrypt.org/directory
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - '1.1.1.1:53'
          - '8.8.8.8:53'
      keyType: EC256

log:
  level: INFO

accessLog: {}
